apis:
  - aid: raken:raken-public-api
    name: Raken Public API
    description: >-
      Raken Public API 3.0 is a REST API protected by OAuth 2.0 that exposes
      the core entities of the Raken construction field-management platform:
      projects (and their child projects, notes, members, production
      insights), members and member project assignments, daily reports, work
      logs, equipment logs, equipment, material logs, materials and material
      units, time cards, shifts, classifications, cost codes, pay types,
      budgets, checklists and checklist templates, toolbox talks (current and
      past), observations, groups, and certifications. Developers register
      OAuth apps in the Raken Developer Console at
      app.rakenapp.com/developer/apps to obtain client_id and client_secret,
      then exchange an authorization code for an access token at
      app.rakenapp.com/oauth/token. The API supports GET, POST, and PATCH
      verbs, and is rate limited by per-second, concurrent-burst, and daily
      quota caps tied to subscription tier.
    humanURL: https://developer.rakenapp.com/api/docs/index.html
    baseURL: https://api.rakenapp.com/
