aid: raken
name: Raken
description: >-
  Raken is a San Diego-based construction technology company providing a
  field-first daily reporting and field management platform for general
  contractors, subcontractors, and heavy-civil contractors. The Raken mobile
  and web apps let field crews capture daily progress reports, time cards,
  production quantities, safety observations, toolbox talks, photos, videos,
  and checklists, then push that data back to the office in real time. Office
  users get dashboards across projects, members, equipment, materials,
  budgets, and certifications, and can sync data with accounting, payroll,
  and project management tools such as QuickBooks, Sage, Foundation, Procore,
  Autodesk, and Bluebeam. Raken also exposes a Public API 3.0 — a REST API
  protected by OAuth 2.0 — covering projects, members, daily reports, shifts,
  time cards, work logs, equipment logs, material logs, observations,
  checklists, toolbox talks, certifications, groups, classifications, cost
  codes, pay types, budgets, and more, enabling third-party integrations and
  custom workflow automation across the construction back office.
