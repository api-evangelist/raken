  - type: Features
    data:
      - Daily progress reporting with notes, photos, and videos that sync from
        mobile to web in real time
      - Auto-generated, brandable PDF daily report exports for owners, GCs,
        and clients
      - Time cards and time tracking with classifications, cost codes, pay
        types, and crew-based or per-worker entry
      - Production tracking against cost codes and budgets with
        units-installed and quantities-completed
      - Equipment tracking and equipment logs with idle and active hours
      - Material tracking, material units, and material logs
      - Safety management with observations, incident logging, and safety
        dashboards
      - Toolbox talks (current and past) library and sign-off workflow
      - Quality management with digital checklists and checklist templates
      - Resource scheduling and workforce planning
      - Project management module with RFIs and document management
      - Production insights and project-level analytics dashboards
      - Member management with certifications, groups, and project membership
        in batch
      - Public API 3.0 over REST with OAuth 2.0 (authorization code) and
        Bearer tokens
      - Webhook-free polling model with per-second, concurrent-burst, and
        daily quota rate limits
      - Native iOS and Android mobile apps, plus full-featured web app
      - Integrations across accounting/payroll (Sage, QuickBooks, Foundation,
        Deltek ComputerEase, Viewpoint, Paychex, Points North, CMiC),
        project management (Procore, Autodesk, Bluebeam), cloud storage
        (Egnyte, Google Drive, Box, Dropbox, OneDrive), and reality capture
        (EarthCam, DroneDeploy, HoloBuilder, TrueLook)
      - Open-source MobX state libraries (mobx-mc) published under the
        rakenapp GitHub organization
